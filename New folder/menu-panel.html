<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzon — Our Menu</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #FFC107;
    --yellow-dark: #E6A800;
    --red: #E53935;
    --dark: #1a1a1a;
    --gray: #555;
    --light: #f8f6f2;
    --white: #ffffff;
    --border: #e8e2d9;
    --star: #FFC107;
    --radius: 12px;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--light); color: var(--dark); min-height: 100vh; }

  header { background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 22px; font-weight: 800; color: var(--dark); letter-spacing: -0.5px; }
  .logo span { color: var(--red); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .admin-link { font-size: 13px; color: var(--gray); text-decoration: none; padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px; transition: all 0.15s; }
  .admin-link:hover { background: var(--dark); color: #fff; border-color: var(--dark); }
  .cart-btn { background: var(--yellow); border: none; border-radius: 8px; padding: 8px 18px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
  .cart-btn:hover { background: var(--yellow-dark); }
  .cart-count { background: var(--red); color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: 700; }

  .banner { background: var(--yellow); padding: 48px 24px; text-align: center; }
  .banner h1 { font-size: 40px; font-weight: 800; letter-spacing: -1px; color: var(--dark); }
  .banner p { margin-top: 8px; color: rgba(0,0,0,0.55); font-size: 15px; }
  .breadcrumb { margin-top: 12px; font-size: 13px; color: rgba(0,0,0,0.45); }
  .breadcrumb a { color: var(--dark); text-decoration: none; font-weight: 500; }

  .menu-section { max-width: 1200px; margin: 0 auto; padding: 48px 24px; }

  .tab-filter { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 36px; }
  .tab-btn { background: var(--white); border: 1.5px solid var(--border); border-radius: 50px; padding: 8px 22px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; color: var(--gray); }
  .tab-btn:hover { border-color: var(--yellow); color: var(--dark); }
  .tab-btn.active { background: var(--yellow); border-color: var(--yellow); color: var(--dark); font-weight: 700; }

  .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  @media (max-width: 900px) { .menu-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .menu-grid { grid-template-columns: 1fr; } }

  .menu-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; }
  .menu-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
  .card-img-wrap { width: 100%; aspect-ratio: 4/3; overflow: hidden; background: var(--light); display: flex; align-items: center; justify-content: center; font-size: 52px; }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .card-title { font-size: 16px; font-weight: 700; color: var(--dark); line-height: 1.3; }
  .card-price { font-size: 16px; font-weight: 800; color: var(--red); white-space: nowrap; }
  .stars { display: flex; gap: 2px; margin-bottom: 8px; }
  .stars span { color: var(--star); font-size: 13px; }
  .card-desc { font-size: 13px; color: var(--gray); line-height: 1.5; flex: 1; margin-bottom: 14px; }
  .order-btn { background: var(--dark); color: var(--white); border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .order-btn:hover { background: #333; }
  .order-btn:active { transform: scale(0.98); }
  .order-btn.added { background: #2e7d32; }
  .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 50px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .badge-offer { background: #fff3e0; color: #e65100; }
  .badge-new { background: #e8f5e9; color: #2e7d32; }
  .badge-hot { background: #fde8e8; color: var(--red); }
  .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 0; color: var(--gray); font-size: 15px; }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state a { color: var(--yellow-dark); font-weight: 600; }

  .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .cart-overlay.open { opacity: 1; pointer-events: all; }
  .cart-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 380px; max-width: 100vw; background: var(--white); z-index: 201; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); box-shadow: -8px 0 32px rgba(0,0,0,0.12); }
  .cart-drawer.open { transform: translateX(0); }
  .drawer-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .drawer-header h2 { font-size: 16px; font-weight: 700; letter-spacing: 0.04em; }
  .close-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--gray); line-height: 1; padding: 2px 6px; border-radius: 6px; }
  .close-btn:hover { background: var(--light); color: var(--dark); }
  .drawer-items { flex: 1; overflow-y: auto; padding: 16px 24px; }
  .cart-empty-msg { text-align: center; padding: 60px 0; color: var(--gray); font-size: 14px; }
  .cart-empty-msg .icon { font-size: 36px; margin-bottom: 12px; }
  .cart-item-row { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: center; }
  .cart-item-thumb { width: 44px; height: 44px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; background: var(--light); }
  .cart-item-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-item-price { font-size: 13px; color: var(--red); font-weight: 700; }
  .qty-ctrl { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
  .qty-btn { width: 24px; height: 24px; border: 1px solid var(--border); background: var(--light); border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .qty-btn:hover { background: var(--yellow); border-color: var(--yellow); }
  .qty-num { font-size: 14px; font-weight: 600; min-width: 16px; text-align: center; }
  .remove-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: #ccc; padding: 4px; border-radius: 4px; transition: color 0.15s; flex-shrink: 0; }
  .remove-btn:hover { color: var(--red); }
  .drawer-footer { border-top: 1px solid var(--border); padding: 20px 24px; }
  .subtotal-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .subtotal-label { font-size: 14px; color: var(--gray); }
  .subtotal-val { font-size: 20px; font-weight: 800; color: var(--dark); }
  .subtotal-note { font-size: 12px; color: #aaa; margin-bottom: 16px; }
  .checkout-btn { display: block; width: 100%; background: var(--yellow); border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-bottom: 8px; }
  .checkout-btn:hover { background: var(--yellow-dark); }
  .view-cart-btn { display: block; width: 100%; background: none; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  .view-cart-btn:hover { border-color: var(--dark); background: var(--light); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Pizz<span>on</span></div>
    <div class="header-right">
      <a class="admin-link" href="admin-panel.html">⚙️ Admin</a>
      <button class="cart-btn" id="cartToggle">
        🛒 Cart <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </div>
</header>

<div class="banner">
  <h1>Our Menu</h1>
  <p>Fresh ingredients, bold flavours — pick your favourite.</p>
  <div class="breadcrumb"><a href="#">Home</a> › Our Menu</div>
</div>

<section class="menu-section">
  <div class="tab-filter" id="tabFilter">
    <button class="tab-btn active" data-tab="all">All</button>
    <button class="tab-btn" data-tab="slides">Slides</button>
    <button class="tab-btn" data-tab="pizzas">Pizzas</button>
    <button class="tab-btn" data-tab="offers">Offers</button>
    <button class="tab-btn" data-tab="pasta">Pasta</button>
  </div>
  <div class="menu-grid" id="menuGrid"></div>
</section>

<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="drawer-header">
    <h2>SHOPPING CART</h2>
    <button class="close-btn" id="cartClose">✕</button>
  </div>
  <div class="drawer-items" id="drawerItems"></div>
  <div class="drawer-footer" id="drawerFooter" style="display:none">
    <div class="subtotal-row">
      <span class="subtotal-label">Subtotal</span>
      <span class="subtotal-val" id="subtotalVal">$0.00</span>
    </div>
    <p class="subtotal-note">Taxes and shipping calculated at checkout</p>
    <button class="checkout-btn">Checkout</button>
    <button class="view-cart-btn">View Cart</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'pizzon_menu_items';
let MENU = [];
let cart = {};
let activeTab = 'all';

function loadMenu() {
  const raw = localStorage.getItem(STORAGE_KEY);
  MENU = raw ? JSON.parse(raw) : [];
}

function stars(n) {
  return Array.from({length:5}, (_,i) => `<span>${i < n ? '★' : '☆'}</span>`).join('');
}

function badgeHTML(b) {
  if (!b) return '';
  const map = { offer:'badge-offer', new:'badge-new', hot:'badge-hot' };
  return `<span class="badge ${map[b]}">${b}</span>`;
}

function thumbHTML(item) {
  if (item.img) return `<img src="${item.img}" alt="${item.name}">`;
  return item.emoji || '🍽️';
}

function renderGrid() {
  loadMenu();
  const grid = document.getElementById('menuGrid');
  const items = activeTab === 'all' ? MENU : MENU.filter(m => m.cat === activeTab);
  if (!items.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🍽️</div>No items here yet.<br><a href="admin-panel.html">Add from admin panel →</a></div>`;
    return;
  }
  grid.innerHTML = items.map(item => `
    <div class="menu-card">
      <div class="card-img-wrap">${item.img ? `<img src="${item.img}" alt="${item.name}">` : (item.emoji || '🍽️')}</div>
      <div class="card-body">
        ${badgeHTML(item.badge)}
        <div class="card-head">
          <div class="card-title">${item.name}</div>
          <div class="card-price">$${item.price}.00</div>
        </div>
        <div class="stars">${stars(item.stars)}</div>
        <div class="card-desc">${item.desc || ''}</div>
        <button class="order-btn" onclick="addToCart(${item.id}, this)">🛒 Order Now</button>
      </div>
    </div>
  `).join('');
}

function addToCart(id, btn) {
  cart[id] = (cart[id] || 0) + 1;
  updateCartUI();
  btn.classList.add('added');
  btn.textContent = '✓ Added!';
  setTimeout(() => { btn.classList.remove('added'); btn.innerHTML = '🛒 Order Now'; }, 1200);
}

function updateCartUI() {
  const total = Object.values(cart).reduce((a,b) => a+b, 0);
  document.getElementById('cartCount').textContent = total;
  renderDrawer();
}

function renderDrawer() {
  const container = document.getElementById('drawerItems');
  const footer = document.getElementById('drawerFooter');
  const ids = Object.keys(cart).filter(id => cart[id] > 0);
  if (!ids.length) {
    container.innerHTML = `<div class="cart-empty-msg"><div class="icon">🛒</div>Your cart is empty.</div>`;
    footer.style.display = 'none';
    return;
  }
  let subtotal = 0;
  container.innerHTML = ids.map(id => {
    const item = MENU.find(m => m.id == id);
    if (!item) return '';
    const qty = cart[id];
    subtotal += item.price * qty;
    const thumb = item.img
      ? `<div class="cart-item-thumb"><img src="${item.img}" alt="${item.name}"></div>`
      : `<div class="cart-item-thumb">${item.emoji || '🍽️'}</div>`;
    return `
      <div class="cart-item-row">
        ${thumb}
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">$${(item.price * qty).toFixed(2)}</div>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty(${id},-1)">−</button>
            <span class="qty-num">${qty}</span>
            <button class="qty-btn" onclick="changeQty(${id},1)">+</button>
          </div>
        </div>
        <button class="remove-btn" onclick="removeItem(${id})">✕</button>
      </div>`;
  }).join('');
  document.getElementById('subtotalVal').textContent = `$${subtotal.toFixed(2)}`;
  footer.style.display = 'block';
}

function changeQty(id, delta) {
  cart[id] = (cart[id] || 0) + delta;
  if (cart[id] <= 0) delete cart[id];
  updateCartUI();
}
function removeItem(id) { delete cart[id]; updateCartUI(); }

document.getElementById('cartToggle').addEventListener('click', () => {
  document.getElementById('cartDrawer').classList.add('open');
  document.getElementById('cartOverlay').classList.add('open');
});
document.getElementById('cartClose').addEventListener('click', closeCart);
document.getElementById('cartOverlay').addEventListener('click', closeCart);
function closeCart() {
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('cartOverlay').classList.remove('open');
}

document.getElementById('tabFilter').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeTab = btn.dataset.tab;
  renderGrid();
});

// Re-render when admin makes changes in another tab
window.addEventListener('storage', e => { if (e.key === STORAGE_KEY) renderGrid(); });

renderGrid();
renderDrawer();
</script>
</body>
</html>
